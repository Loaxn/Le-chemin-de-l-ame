<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le Voyage de l'Âme</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400;600&family=Raleway:wght@200;300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --sand1:#C47B2A; --sand2:#A8601A; --sand3:#7A400A;
  --sky1:#1C2030;  --sky2:#3A3020;  --sky3:#6B4A1A;
  --cream:#F5EDD5; --gold:#D4A843;  --gold2:#B88A2A;
  --c1:#D4A843;    --c1r:212,168,67;
}
html,body{width:100%;height:100%;overflow:hidden;background:#1A1408;font-family:'Raleway',sans-serif}
canvas{position:fixed;inset:0;width:100%;height:100%;z-index:0}

/* ── Vignette ── */
.vig{position:fixed;inset:0;z-index:1;pointer-events:none;
  background:radial-gradient(ellipse 90% 70% at 50% 45%,transparent 25%,rgba(15,10,5,.35) 65%,rgba(10,7,3,.82) 100%)}

/* ── Corner ornaments (inspired by image) ── */
.corner{position:fixed;z-index:4;pointer-events:none;opacity:.55}
.corner svg{display:block}
#c-tl{top:16px;left:16px}
#c-br{bottom:16px;right:16px}

/* ── Sound toggle ── */
#sound-btn{
  position:fixed;top:18px;right:22px;z-index:20;
  background:transparent;border:none;cursor:pointer;
  color:rgba(212,168,67,.5);font-size:.58rem;letter-spacing:.2em;
  font-family:'Raleway',sans-serif;font-weight:200;text-transform:uppercase;
  display:flex;align-items:center;gap:6px;transition:color .3s;
}
#sound-btn:hover{color:rgba(212,168,67,.85)}
#sound-icon{font-size:.9rem}

/* ── Progress dots ── */
#dots{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);
  display:flex;gap:9px;z-index:20;opacity:0;transition:opacity .6s ease}
.dot{width:4px;height:4px;border-radius:50%;background:rgba(var(--c1r),.2);transition:all .4s}
.dot.active{background:rgba(var(--c1r),.85);transform:scale(1.4)}

/* ── Scenes ── */
.scene{position:fixed;inset:0;z-index:5;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:2rem;
  opacity:0;pointer-events:none;transition:opacity 1s ease}
.scene.active{opacity:1;pointer-events:all}

/* ── Type ── */
.eyebrow{font-weight:200;font-size:clamp(.5rem,1vw,.6rem);letter-spacing:.38em;
  text-transform:uppercase;color:rgba(var(--c1r),.55);margin-bottom:1.4rem}
.serif{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;
  color:var(--cream);line-height:1.8}
.cinzel{font-family:'Cinzel',serif;font-weight:400;color:var(--cream);letter-spacing:.08em}
.big{font-size:clamp(1.4rem,3.8vw,2.3rem);margin-bottom:.7rem}
.med{font-size:clamp(1rem,2.2vw,1.35rem)}
.dim{color:rgba(245,237,213,.38);font-size:clamp(.5rem,.9vw,.58rem);
  letter-spacing:.2em;text-transform:uppercase;margin-top:.5rem}
.gold{color:var(--gold)}
hr.orn{border:none;height:.5px;
  background:linear-gradient(to right,transparent,rgba(var(--c1r),.4),transparent);
  width:min(240px,36vw);margin:1.6rem 0}

/* ── Diamond button (like image) ── */
.btn{
  font-family:'Cinzel',serif;font-weight:400;
  font-size:clamp(.55rem,1.1vw,.65rem);letter-spacing:.28em;
  color:var(--cream);background:rgba(212,168,67,.12);
  border:.5px solid rgba(212,168,67,.4);
  padding:11px 40px;cursor:pointer;position:relative;
  clip-path:polygon(12px 0%,calc(100% - 12px) 0%,100% 50%,calc(100% - 12px) 100%,12px 100%,0% 50%);
  transition:background .35s,letter-spacing .35s;
  animation:breathe 3.5s ease-in-out infinite
}
.btn:hover{background:rgba(212,168,67,.22);letter-spacing:.36em;animation:none}
@keyframes breathe{0%,100%{box-shadow:0 0 0 0 rgba(var(--c1r),0)}
  50%{box-shadow:0 0 20px 0 rgba(var(--c1r),.1)}}

/* ── Word reveal ── */
.word{display:inline-block;opacity:0;transform:translateY(7px);
  transition:opacity .5s ease,transform .5s ease;white-space:pre}
.word.vis{opacity:1;transform:translateY(0)}

/* ── Scene 0 ── */
#s0{text-align:center;gap:0}
#s0-title{font-family:'Cinzel',serif;font-weight:600;
  font-size:clamp(3rem,10vw,7rem);letter-spacing:.15em;
  color:var(--cream);text-shadow:0 0 60px rgba(212,168,67,.25);
  margin-bottom:.3rem;opacity:0;transform:scale(.96) translateY(8px);
  transition:opacity 1.2s ease,transform 1.2s ease}
#s0-title.vis{opacity:1;transform:scale(1) translateY(0)}
#s0-sub{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;
  font-size:clamp(.7rem,1.6vw,.95rem);letter-spacing:.22em;
  color:rgba(212,168,67,.6);margin-bottom:.3rem;
  opacity:0;transition:opacity 1s ease .3s}
#s0-sub.vis{opacity:1}

/* ── Scene 1 — Arches ── */
#s1{text-align:center}
.arches{display:flex;align-items:flex-end;justify-content:center;gap:clamp(1rem,3.5vw,2.8rem)}
.arch{display:flex;flex-direction:column;align-items:center;cursor:pointer;
  opacity:0;transform:translateY(18px);transition:opacity .7s ease,transform .7s ease}
.arch.vis{opacity:1;transform:translateY(0)}
.arch:nth-child(1){transition-delay:.1s}.arch:nth-child(2){transition-delay:.25s}.arch:nth-child(3){transition-delay:.4s}
.arch-gate{width:clamp(68px,12vw,105px);transition:transform .4s cubic-bezier(.34,1.5,.64,1),filter .4s}
.arch:nth-child(2) .arch-gate{width:clamp(82px,15vw,125px)}
.arch:hover .arch-gate{transform:translateY(-6px) scale(1.05)}
.arch-gate path.bd{fill:none;stroke-width:1;animation:gp 3.2s ease-in-out infinite}
.arch-gate path.fl{stroke:none;opacity:.07;transition:opacity .35s}
.arch:hover .arch-gate path.fl{opacity:.16}
@keyframes gp{0%,100%{opacity:.5}50%{opacity:.9}}
.arch:nth-child(1) .arch-gate path.bd{stroke:#8B6FD4;animation-delay:0s}
.arch:nth-child(2) .arch-gate path.bd{stroke:#5A7FA8;animation-delay:1.1s}
.arch:nth-child(3) .arch-gate path.bd{stroke:#D4A843;animation-delay:2.2s}
.arch:nth-child(1) .arch-gate path.fl{fill:#8B6FD4}
.arch:nth-child(2) .arch-gate path.fl{fill:#5A7FA8}
.arch:nth-child(3) .arch-gate path.fl{fill:#D4A843}
.arch-lbl{margin-top:1rem;display:flex;flex-direction:column;align-items:center;gap:.35rem}
.arch-ic{font-size:clamp(1rem,2.5vw,1.3rem);filter:drop-shadow(0 0 5px currentColor);transition:transform .3s}
.arch:hover .arch-ic{transform:scale(1.2)}
.arch-nm{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;
  font-size:clamp(.85rem,1.8vw,1.05rem);letter-spacing:.1em}
.arch:nth-child(1) .arch-nm{color:#C4AEF0}
.arch:nth-child(2) .arch-nm{color:#A8C4E0}
.arch:nth-child(3) .arch-nm{color:#E8C97A}

/* ── Scene 2 — choices per branch ── */
#s2{text-align:center}
.s2-card{max-width:min(520px,88vw);margin:1.4rem 0;position:relative;
  border:.5px solid rgba(var(--c1r),.15);padding:clamp(1.4rem,3.5vw,2.4rem);background:rgba(15,10,5,.45)}
.s2-card::before{content:'';position:absolute;top:0;left:12%;right:12%;height:.5px;
  background:linear-gradient(to right,transparent,var(--c1),transparent)}
.choices{display:flex;flex-direction:column;gap:.9rem;margin-top:1.6rem;align-items:center}
.cbtn{
  font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;
  font-size:clamp(.9rem,2vw,1.1rem);letter-spacing:.05em;
  color:rgba(245,237,213,.75);background:rgba(var(--c1r),.04);
  border:.5px solid rgba(var(--c1r),.18);
  padding:10px clamp(18px,3vw,28px);cursor:pointer;width:100%;max-width:360px;
  transition:all .3s ease;position:relative;overflow:hidden
}
.cbtn:hover{background:rgba(var(--c1r),.1);color:var(--cream);border-color:rgba(var(--c1r),.45)}
.cbtn .cbtn-sub{display:block;font-family:'Raleway',sans-serif;font-style:normal;
  font-size:.52rem;letter-spacing:.2em;text-transform:uppercase;
  color:rgba(var(--c1r),.45);margin-top:3px}

/* ══════════════════════════════════════════════
   VISUAL FX LAYERS
══════════════════════════════════════════════ */
#lucioles{position:fixed;inset:0;z-index:3;pointer-events:none;opacity:0;transition:opacity 1.4s ease}
#lucioles.show{opacity:1}
#rays{position:fixed;inset:0;z-index:2;pointer-events:none;opacity:0;transition:opacity 1.8s ease}
#rays.show{opacity:1}

/* rêve — float + violet glow */
body.fx-reve #s2-card-inner{animation:float-card 4s ease-in-out infinite;filter:drop-shadow(0 0 20px rgba(139,111,212,.25))}
@keyframes float-card{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
body.fx-reve .serif{text-shadow:0 0 25px rgba(139,111,212,.3)}

/* peur — glitch + shake */
body.fx-peur #s2{animation:scene-shake 5s infinite}
@keyframes scene-shake{0%,88%,100%{transform:translate(0,0)}89%{transform:translate(-3px,1px)}90%{transform:translate(3px,-2px)}91%{transform:translate(-1px,2px)}92%{transform:translate(2px,-1px)}}
body.fx-peur #s2-card-inner{animation:glitch-card 3.5s infinite}
@keyframes glitch-card{0%,92%,100%{transform:translate(0) skewX(0)}93%{transform:translate(-4px,1px) skewX(-2deg);filter:hue-rotate(80deg) brightness(1.15)}94%{transform:translate(3px,-1px) skewX(1.5deg)}95%{transform:translate(-2px,2px);filter:hue-rotate(-50deg)}96%{transform:translate(0) skewX(0)}}
body.fx-peur .serif{text-shadow:2px 0 rgba(255,0,80,.5),-2px 0 rgba(0,200,255,.4);animation:flicker-txt 4s infinite}
@keyframes flicker-txt{0%,84%,100%{opacity:1}85%{opacity:.6}86%{opacity:1}89%{opacity:.45}90%{opacity:1}}

/* sens — golden glow + breathe */
body.fx-sens #s2-card-inner{animation:sens-glow 3.5s ease-in-out infinite}
@keyframes sens-glow{0%,100%{filter:drop-shadow(0 0 10px rgba(212,168,67,.12))}50%{filter:drop-shadow(0 0 30px rgba(212,168,67,.38))}}
body.fx-sens .serif{animation:gold-txt 3.5s ease-in-out infinite}
@keyframes gold-txt{0%,100%{text-shadow:0 0 6px rgba(212,168,67,.15)}50%{text-shadow:0 0 24px rgba(212,168,67,.55)}}

/* ── Scene 3 — Finale ── */
#s3{text-align:center}
.hex-wrap{width:clamp(90px,16vw,130px);height:clamp(90px,16vw,130px);
  margin:0 auto 1.8rem;position:relative}
.hex-wrap svg{width:100%;height:100%;animation:hspin 25s linear infinite}
@keyframes hspin{to{transform:rotate(360deg)}}
.hex-glow{position:absolute;inset:18%;border-radius:50%;
  animation:hpulse 3.5s ease-in-out infinite}
@keyframes hpulse{0%,100%{opacity:.4;transform:scale(.88)}50%{opacity:1;transform:scale(1.08)}}
.final-wrap{max-width:min(500px,85vw);margin:0 auto}
#final-arch{display:inline-block;font-weight:300;font-size:.58rem;
  letter-spacing:.28em;text-transform:uppercase;color:var(--c1);
  border:.5px solid rgba(var(--c1r),.3);padding:5px 18px;margin-bottom:1.6rem;opacity:.8}
.restart{font-family:'Raleway',sans-serif;font-weight:200;font-size:.55rem;
  letter-spacing:.22em;text-transform:uppercase;color:rgba(245,237,213,.28);
  background:transparent;border:none;cursor:pointer;margin-top:1rem;
  display:block;margin-left:auto;margin-right:auto;transition:color .3s}
.restart:hover{color:rgba(245,237,213,.65)}

/* ── Popup ── */
#pop{position:fixed;inset:0;z-index:30;display:flex;align-items:center;justify-content:center;
  background:rgba(10,7,3,.78);backdrop-filter:blur(10px);
  opacity:0;pointer-events:none;transition:opacity .4s ease}
#pop.show{opacity:1;pointer-events:all}
#pop-box{width:min(460px,88vw);background:rgba(18,13,7,.96);
  border:.5px solid rgba(var(--c1r),.12);
  padding:clamp(1.8rem,4.5vw,2.8rem) clamp(1.4rem,4vw,2.6rem);text-align:center;
  transform:scale(.93) translateY(12px);transition:transform .45s cubic-bezier(.34,1.4,.64,1);
  position:relative}
#pop.show #pop-box{transform:scale(1) translateY(0)}
#pop-box::before{content:'';position:absolute;top:0;left:14%;right:14%;height:.5px;
  background:var(--pop-c,rgba(212,168,67,.5))}
#pop-ic{font-size:2rem;display:block;margin-bottom:.9rem;animation:flic 3s ease-in-out infinite}
@keyframes flic{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
#pop-title{font-family:'Cinzel',serif;font-weight:400;font-size:clamp(1rem,2.2vw,1.25rem);
  color:var(--pop-c,var(--gold));margin-bottom:.8rem;letter-spacing:.04em}
#pop-body{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;
  font-size:clamp(.95rem,2vw,1.15rem);color:rgba(245,237,213,.82);line-height:1.85;margin-bottom:1.6rem}
#pop-close{font-family:'Cinzel',serif;font-weight:400;font-size:.6rem;letter-spacing:.26em;
  color:var(--pop-c,var(--gold));background:transparent;
  border:.5px solid var(--pop-c,rgba(212,168,67,.3));
  padding:9px 30px;cursor:pointer;transition:background .3s,letter-spacing .3s;
  clip-path:polygon(8px 0%,calc(100% - 8px) 0%,100% 50%,calc(100% - 8px) 100%,8px 100%,0% 50%)}
#pop-close:hover{background:rgba(255,255,255,.04);letter-spacing:.34em}

/* ── Night mode ── */
body.night{transition:background 2s ease}
body.night canvas{filter:saturate(.6) brightness(.7)}
body.night .vig{background:radial-gradient(ellipse 90% 70% at 50% 45%,transparent 20%,rgba(2,4,18,.5) 65%,rgba(2,4,18,.92) 100%)}

/* ── Corner ornament ── */
.orn-corner{position:fixed;z-index:20;pointer-events:auto;opacity:.95;transition:opacity .4s}
.orn-corner svg{pointer-events:none;display:block}
.orn-corner .sun-grp{pointer-events:all}
.orn-circle{position:absolute;width:80px;height:80px;top:16px;left:140px;transform:translate(-50%,-50%);border:2px solid rgba(255,240,150,.45);border-radius:50%;animation:sun-circle-spin 6s linear infinite;pointer-events:auto;cursor:pointer;z-index:10}
.orn-circle:hover{border-color:rgba(255,255,0,.9);animation-duration:2.5s}
#orn-tl{bottom:20px;left:20px;transform-origin:bottom left;transform:scale(1.8);animation:ornament-glow 2.5s ease-in-out infinite}
#orn-br{display:none}
@keyframes ornament-glow{0%,100%{filter:drop-shadow(0 0 20px rgba(212,168,67,.6)) drop-shadow(0 0 40px rgba(212,168,67,.3))}50%{filter:drop-shadow(0 0 35px rgba(212,168,67,.95)) drop-shadow(0 0 60px rgba(212,168,67,.6))}}

/* Sun group — hover spin, click morph */
.sun-grp{cursor:pointer;transform-box:fill-box;transform-origin:184px 22px;
  transition:opacity .8s ease, filter .3s ease;will-change:transform,filter;position:relative;z-index:1}
.sun-grp:hover:not(.spin-click){filter:brightness(1.5) drop-shadow(0 0 25px rgba(255,230,0,.8))}
.sun-grp:active{filter:brightness(.68)}
.sun-grp.spin-click{animation:sun-spin-click .4s linear;filter:brightness(.68)}
@keyframes sun-circle-spin{from{transform:translate(-50%,-50%) rotate(0deg)}to{transform:translate(-50%,-50%) rotate(360deg)}}
@keyframes sun-spin-click{0%{transform:rotate(0deg)}100%{transform:rotate(720deg)}}
.sun-paths{transition:opacity .8s ease}
.moon-path{opacity:0;transition:opacity .8s ease;transform-origin:184px 22px}
body.night .sun-paths{opacity:0}
body.night .moon-path{opacity:1}

/* ── Fade ── */
#fade{position:fixed;inset:0;z-index:40;background:#1A1408;
  opacity:0;pointer-events:none;transition:opacity 1.5s ease}
#fade.on{opacity:1;pointer-events:all}
</style>
</head>

</svg>
<div class="orn-circle" onclick="toggleNight()"></div>

function initCanvas(){

}
function mkGrain(fromLeft,hy){
  return{x:fromLeft?-3:Math.random()*W,
    y:hy+Math.random()*H*.35,
    vx:.5+Math.random()*1.0,vy:(Math.random()-.6)*.12,
    s:Math.random()*1.6+.3,o:Math.random()*.3+.05};
}
let shoot=null,stTimer=250;

function getCanvasPoint(evt){
  const rect=cvs.getBoundingClientRect();
  return {x:evt.clientX-rect.left,y:evt.clientY-rect.top};
}
function isSunPoint(x,y){
  const mx=W*.8,my=H*.12,mr=Math.min(W,H)*.036;
  return Math.hypot(x-mx,y-my) <= mr*2.1;
}
function updateSunHover(x,y){
  const hover = isSunPoint(x,y);
  if(sunHover!==hover){
    sunHover=hover;
    cvs.style.cursor = hover ? 'pointer' : 'default';
  }
}

cvs.addEventListener('mousemove',e=>{
  const pt=getCanvasPoint(e);
  updateSunHover(pt.x,pt.y);
});
cvs.addEventListener('mouseleave',()=>{
  sunHover=false; cvs.style.cursor='default';
});
cvs.addEventListener('click',e=>{
  const pt=getCanvasPoint(e);
  if(isSunPoint(pt.x,pt.y)) toggleNight();
});

function drawFrame(){
  T++;ctx.clearRect(0,0,W,H);
  // Sky gradient — warm desert palette, shifts to deep night when toggled
  const sk=ctx.createLinearGradient(0,0,0,H*.65);
  if(isNight){
    sk.addColorStop(0,'#020408');sk.addColorStop(.3,'#040810');
    sk.addColorStop(.65,'#0A1020');sk.addColorStop(1,'#1A1010');
  } else {
    sk.addColorStop(0,'#1A1510');sk.addColorStop(.3,'#2A2018');
    sk.addColorStop(.65,'#4A3010');sk.addColorStop(1,'#6B4010');
  }
  ctx.fillStyle=sk;ctx.fillRect(0,0,W,H*.65);

  // Horizon warm glow
  const hc={reve:'rgba(80,50,160,.16)',peur:'rgba(30,55,110,.18)',sens:'rgba(180,100,20,.22)',null:'rgba(140,90,20,.14)'};
  const hy=H*.6;
  const hg=ctx.createLinearGradient(0,hy-H*.15,0,hy+H*.08);
  hg.addColorStop(0,'rgba(0,0,0,0)');hg.addColorStop(.5,hc[branch]||hc['null']);hg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=hg;ctx.fillRect(0,hy-H*.15,W,H*.23);

  // Stars
  for(const s of stars){
    const tw=Math.sin(T*s.sp+s.ph)*.25;
    ctx.beginPath();ctx.arc(s.x*W,s.y*H,s.s,0,Math.PI*2);
    ctx.fillStyle=s.gold?'#E8C97A':'#D8D0C0';
    ctx.globalAlpha=Math.max(.04,Math.min(.9,s.o+tw));ctx.fill();
  }ctx.globalAlpha=1;

  // SUN/MOON
  const mx=W*.8,my=H*.12,mr=Math.min(W,H)*.036;
  
  if(isNight){
    // MOON — crescent shape on dark sky
    ctx.beginPath();
    ctx.arc(mx,my,mr,0,Math.PI*2);
    ctx.fillStyle='#F5F0E1';ctx.fill();
    
    // Shadow to create crescent
    ctx.beginPath();
    ctx.arc(mx+mr*.35,my,mr*.95,0,Math.PI*2);
    ctx.fillStyle='#020408';ctx.fill();
    
    // Glow around moon
    const moonGlow=ctx.createRadialGradient(mx,my,mr,mx,my,mr*2.2);
    moonGlow.addColorStop(0,'rgba(245,240,225,0.08)');
    moonGlow.addColorStop(1,'rgba(245,240,225,0)');
    ctx.fillStyle=moonGlow;ctx.fillRect(mx-mr*2.2,my-mr*2.2,mr*4.4,mr*4.4);
  } else {
    // SUN — yellow by default, blue on hover
    const sunColors = sunHover
      ? { glow: ['rgba(140,180,255,0.06)','rgba(140,180,255,0.035)','rgba(140,180,255,0.016)'], core: ['#E5F1FF','#8FB8FF','#4C7CD8'] }
      : { glow: ['rgba(255,220,130,0.06)','rgba(255,220,130,0.035)','rgba(255,220,130,0.016)'], core: ['#FFF1C8','#F2D27A','#C89A34'] };
    [.06,.035,.016].forEach((a,i)=>{
      ctx.beginPath();ctx.arc(mx,my,mr*(2.1-i*.3),0,Math.PI*2);
      ctx.fillStyle=sunColors.glow[i];ctx.fill();
    });
    const mg=ctx.createRadialGradient(mx-mr*.2,my-mr*.2,mr*.08,mx,my,mr);
    mg.addColorStop(0,sunColors.core[0]);mg.addColorStop(.55,sunColors.core[1]);mg.addColorStop(1,sunColors.core[2]);
    ctx.beginPath();ctx.arc(mx,my,mr,0,Math.PI*2);ctx.fillStyle=mg;ctx.fill();
  }

  // Shooting star
  stTimer--;
  if(stTimer<=0){stTimer=300+Math.floor(Math.random()*500);
    shoot={x:Math.random()*W*.7+W*.05,y:Math.random()*H*.22,len:70+Math.random()*80,a:.35+Math.random()*.3,life:1};
  }
  if(shoot){
    shoot.life-=.035;
    if(shoot.life<=0){shoot=null;}else{
      const ex=shoot.x+Math.cos(shoot.a)*shoot.len,ey=shoot.y+Math.sin(shoot.a)*shoot.len;
      const sg=ctx.createLinearGradient(shoot.x,shoot.y,ex,ey);
      sg.addColorStop(0,'rgba(255,240,180,0)');sg.addColorStop(.5,`rgba(255,240,180,${shoot.life*.65})`);sg.addColorStop(1,'rgba(255,240,180,0)');
      ctx.beginPath();ctx.moveTo(shoot.x,shoot.y);ctx.lineTo(ex,ey);
      ctx.strokeStyle=sg;ctx.lineWidth=1.1;ctx.stroke();
      shoot.x+=Math.cos(shoot.a)*16;shoot.y+=Math.sin(shoot.a)*16;
    }
  }

  // Dunes — warm amber/sienna palette from reference image
  // Layer 4 far
  ctx.beginPath();ctx.moveTo(0,hy-8);
  ctx.bezierCurveTo(W*.2,hy-62,W*.38,hy-18,W*.55,hy-45);
  ctx.bezierCurveTo(W*.7,hy-65,W*.85,hy-22,W,hy-35);
  ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();
  ctx.fillStyle='#1E160A';ctx.fill();

  // Layer 3
  ctx.beginPath();ctx.moveTo(0,hy+15);
  ctx.bezierCurveTo(W*.14,hy-42,W*.32,hy+8,W*.5,hy-32);
  ctx.bezierCurveTo(W*.66,hy-58,W*.83,hy-8,W,hy-25);
  ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();
  ctx.fillStyle='#261A0C';ctx.fill();

  // Layer 2 — mid dunes with warm sand color
  ctx.beginPath();ctx.moveTo(0,hy+35);
  ctx.bezierCurveTo(W*.1,hy-20,W*.26,hy+28,W*.42,hy+2);
  ctx.bezierCurveTo(W*.57,hy-38,W*.74,hy+18,W*.87,hy-8);
  ctx.bezierCurveTo(W*.93,hy-22,W,hy+8,W,hy+12);
  ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();
  const dg2=ctx.createLinearGradient(0,hy-40,0,hy+35);
  dg2.addColorStop(0,'#3D250E');dg2.addColorStop(1,'#2A1808');
  ctx.fillStyle=dg2;ctx.fill();
  // ridge light
  ctx.beginPath();ctx.moveTo(0,hy+35);
  ctx.bezierCurveTo(W*.1,hy-20,W*.26,hy+28,W*.42,hy+2);
  ctx.bezierCurveTo(W*.57,hy-38,W*.74,hy+18,W*.87,hy-8);
  ctx.bezierCurveTo(W*.93,hy-22,W,hy+8,W,hy+12);
  ctx.strokeStyle='rgba(190,140,60,.11)';ctx.lineWidth=1.2;ctx.stroke();

  // Layer 1 — foreground, richest sand color
  ctx.beginPath();ctx.moveTo(0,hy+72);
  ctx.bezierCurveTo(W*.07,hy+28,W*.2,hy+88,W*.36,hy+52);
  ctx.bezierCurveTo(W*.5,hy+22,W*.63,hy+72,W*.78,hy+48);
  ctx.bezierCurveTo(W*.88,hy+32,W,hy+52,W,hy+62);
  ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();
  const dg1=ctx.createLinearGradient(0,hy+20,0,H);
  dg1.addColorStop(0,'#5C3512');dg1.addColorStop(.3,'#3E2208');dg1.addColorStop(1,'#221205');
  ctx.fillStyle=dg1;ctx.fill();
  // foreground ridge
  ctx.beginPath();ctx.moveTo(0,hy+72);
  ctx.bezierCurveTo(W*.07,hy+28,W*.2,hy+88,W*.36,hy+52);
  ctx.bezierCurveTo(W*.5,hy+22,W*.63,hy+72,W*.78,hy+48);
  ctx.bezierCurveTo(W*.88,hy+32,W,hy+52,W,hy+62);
  ctx.strokeStyle='rgba(220,170,80,.18)';ctx.lineWidth=1.8;ctx.stroke();

  // Sand grains
  for(const g of grains){
    g.x+=g.vx;g.y+=g.vy+Math.sin(T*.011+g.x*.009)*.1;
    if(g.x>W+4)Object.assign(g,mkGrain(true,hy));
    ctx.beginPath();ctx.arc(g.x,g.y,g.s,0,Math.PI*2);
    ctx.fillStyle='#C9903A';
    ctx.globalAlpha=g.o*(.45+Math.sin(T*.007+g.x*.02)*.28);ctx.fill();
  }ctx.globalAlpha=1;

  requestAnimationFrame(drawFrame);
}

// ═══════════════════════════════════════════════════════
//  AMBIENT SOUND — Web Audio API wind
// ═══════════════════════════════════════════════════════
function startSound(){
  if(audioCtx)return;
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  const bufSz=audioCtx.sampleRate*2;
  const buf=audioCtx.createBuffer(1,bufSz,audioCtx.sampleRate);
  const data=buf.getChannelData(0);
  for(let i=0;i<bufSz;i++)data[i]=(Math.random()*2-1);
  // Wind source
  windNode=audioCtx.createBufferSource();
  windNode.buffer=buf;windNode.loop=true;
  const lp=audioCtx.createBiquadFilter();lp.type='lowpass';lp.frequency.value=320;lp.Q.value=.4;
  const hp=audioCtx.createBiquadFilter();hp.type='highpass';hp.frequency.value=60;
  const gain=audioCtx.createGain();gain.gain.value=.09;
  // Slow tremolo
  const lfo=audioCtx.createOscillator();lfo.frequency.value=.08;
  const lfoGain=audioCtx.createGain();lfoGain.gain.value=.04;
  lfo.connect(lfoGain);lfoGain.connect(gain.gain);lfo.start();
  windNode.connect(lp);lp.connect(hp);hp.connect(gain);gain.connect(audioCtx.destination);
  windNode.start();
}
function stopSound(){
  if(!windNode)return;
  windNode.stop();windNode=null;
  audioCtx.close();audioCtx=null;
}
function toggleSound(){
  soundOn=!soundOn;
  document.getElementById('sound-icon').textContent=soundOn?'♫':'♪';
  document.getElementById('sound-lbl').textContent=soundOn?'Silence':'Son';
  soundOn?startSound():stopSound();
}

// ═══════════════════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════════════════
function toScene(n){
  const f=document.getElementById('fade');f.classList.add('on');
  setTimeout(()=>{
    if(n!==2)clearFx();
    document.querySelectorAll('.scene').forEach(s=>s.classList.remove('active'));
    document.getElementById('s'+n).classList.add('active');
    document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===n));
    if(n===1)initS1();
    if(n===3)initS3();
    setTimeout(()=>f.classList.remove('on'),80);
  },700);
}

function initS1(){
  document.getElementById('dots').style.opacity='1';
  document.querySelectorAll('.arch').forEach((a,i)=>{
    a.classList.remove('vis');
    setTimeout(()=>a.classList.add('vis'),180+i*140);
  });
}

function initS3(){
  const d=BRANCHES[branch];if(!d)return;
  document.documentElement.style.setProperty('--c1',d.hexC);
  document.documentElement.style.setProperty('--c1r',d.hexCr);
  document.getElementById('final-arch').textContent='Archétype · '+d.archetype;
  document.getElementById('s3-txt').textContent=d.finalTxt;
  document.getElementById('s3-sub').textContent=d.finalSub;
  document.getElementById('h1').setAttribute('stroke',d.hexC);
  document.getElementById('h2').setAttribute('stroke',d.hexC);
  document.getElementById('hglow').style.background=
    `radial-gradient(circle,rgba(${d.hexCr},.28) 0%,transparent 70%)`;
}

// ═══════════════════════════════════════════════════════
//  VISUAL FX ENGINE
// ═══════════════════════════════════════════════════════

// Lucioles (fireflies) for rêve
let lucCanvas,lucCtx,lucs=[],lucAF;
function startLucioles(){
  lucCanvas=document.getElementById('lucioles');
  lucCtx=lucCanvas.getContext('2d');
  lucCanvas.width=innerWidth;lucCanvas.height=innerHeight;
  lucs=Array.from({length:55},()=>({
    x:Math.random()*innerWidth,y:Math.random()*innerHeight,
    vx:(Math.random()-.5)*.5,vy:(Math.random()-.5)*.5,
    r:Math.random()*2.5+.8,o:Math.random(),op:Math.random()>.5?1:-1,
    os:.008+Math.random()*.015,hue:260+Math.random()*40
  }));
  lucCanvas.classList.add('show');
  function loop(){
    lucCtx.clearRect(0,0,lucCanvas.width,lucCanvas.height);
    for(const l of lucs){
      l.x+=l.vx+Math.sin(Date.now()*.0008+l.y*.01)*.3;
      l.y+=l.vy+Math.cos(Date.now()*.0006+l.x*.01)*.25;
      if(l.x<0)l.x=lucCanvas.width;if(l.x>lucCanvas.width)l.x=0;
      if(l.y<0)l.y=lucCanvas.height;if(l.y>lucCanvas.height)l.y=0;
      l.o+=l.op*l.os;if(l.o>1||l.o<0)l.op*=-1;
      const g=lucCtx.createRadialGradient(l.x,l.y,0,l.x,l.y,l.r*3.5);
      g.addColorStop(0,`hsla(${l.hue},70%,80%,${l.o})`);
      g.addColorStop(1,`hsla(${l.hue},70%,60%,0)`);
      lucCtx.beginPath();lucCtx.arc(l.x,l.y,l.r*3.5,0,Math.PI*2);
      lucCtx.fillStyle=g;lucCtx.fill();
    }
    lucAF=requestAnimationFrame(loop);
  }
  loop();
}
function stopLucioles(){
  if(lucAF)cancelAnimationFrame(lucAF);
  const c=document.getElementById('lucioles');
  c.classList.remove('show');
  setTimeout(()=>{if(lucCtx)lucCtx.clearRect(0,0,c.width,c.height);},1400);
}

// Parallax mouse (rêve)
let parallaxOn=false;
function onMouseMove(e){
  if(!parallaxOn)return;
  const dx=(e.clientX/innerWidth-.5)*18,dy=(e.clientY/innerHeight-.5)*12;
  document.getElementById('s2-card-inner').style.transform=
    `translate(${dx}px,${dy}px) translateY(${document.body.classList.contains('fx-reve')?'0':'0'}px)`;
}

// Golden rays (sens)
function drawRays(){
  const rc=document.getElementById('rays');
  rc.innerHTML='';
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('width','100%');svg.setAttribute('height','100%');
  svg.style.cssText='position:absolute;inset:0';
  const cx=innerWidth*.5,cy=innerHeight*.55;
  const defs=document.createElementNS('http://www.w3.org/2000/svg','defs');
  for(let i=0;i<12;i++){
    const id='rg'+i;
    const grad=document.createElementNS('http://www.w3.org/2000/svg','linearGradient');
    grad.setAttribute('id',id);grad.setAttribute('gradientUnits','userSpaceOnUse');
    const a=((i/12)*Math.PI*2);
    const len=Math.max(innerWidth,innerHeight)*1.3;
    grad.setAttribute('x1',cx);grad.setAttribute('y1',cy);
    grad.setAttribute('x2',cx+Math.cos(a)*len);grad.setAttribute('y2',cy+Math.sin(a)*len);
    ['rgba(212,168,67,0.09)','rgba(212,168,67,0)'].forEach((c,j)=>{
      const s=document.createElementNS('http://www.w3.org/2000/svg','stop');
      s.setAttribute('offset',j===0?'0%':'100%');s.setAttribute('stop-color',c);
      grad.appendChild(s);
    });
    defs.appendChild(grad);
  }
  svg.appendChild(defs);
  for(let i=0;i<12;i++){
    const a=((i/12)*Math.PI*2);const spread=Math.PI*.055;
    const len=Math.max(innerWidth,innerHeight)*1.3;
    const x1=cx+Math.cos(a-spread)*len,y1=cy+Math.sin(a-spread)*len;
    const x2=cx+Math.cos(a+spread)*len,y2=cy+Math.sin(a+spread)*len;
    const path=document.createElementNS('http://www.w3.org/2000/svg','polygon');
    path.setAttribute('points',`${cx},${cy} ${x1},${y1} ${x2},${y2}`);
    path.setAttribute('fill',`url(#rg${i})`);
    path.style.animation=`ray-spin ${18+i*2}s linear infinite`;
    svg.appendChild(path);
  }
  // Inject keyframe for ray spin
  if(!document.getElementById('ray-kf')){
    const st=document.createElement('style');st.id='ray-kf';
    st.textContent='@keyframes ray-spin{to{transform-origin:'+cx+'px '+cy+'px;transform:rotate(360deg)}}';
    document.head.appendChild(st);
  }
  rc.appendChild(svg);
  rc.classList.add('show');
}
function hideRays(){document.getElementById('rays').classList.remove('show');}

// Clear all FX
function clearFx(){
  document.body.className='';
  stopLucioles();hideRays();parallaxOn=false;
  window.removeEventListener('mousemove',onMouseMove);
  const ci=document.getElementById('s2-card-inner');
  if(ci)ci.style.transform='';
}

// Apply FX per branch
function applyFx(key){
  clearFx();
  document.body.classList.add('fx-'+key);
  if(key==='reve'){
    startLucioles();
    parallaxOn=true;
    window.addEventListener('mousemove',onMouseMove);
  } else if(key==='sens'){
    drawRays();
  }
}

// ═══════════════════════════════════════════════════════
//  CHOICE LOGIC
// ═══════════════════════════════════════════════════════
function pick(key){
  branch=key;
  const d=BRANCHES[key];
  document.documentElement.style.setProperty('--c1',d.c);
  document.documentElement.style.setProperty('--c1r',d.cr);
  document.getElementById('s2-ey').textContent=d.s2ey;
  document.getElementById('s2-txt').innerHTML=d.s2txt.replace('\n','<br>');
  document.getElementById('s2-sub').textContent=d.s2sub;
  showPop(d.popIc,d.popTitle,d.popBody,d.c,()=>{
    applyFx(key);
    toScene(2);
  });
}

// ═══════════════════════════════════════════════════════
//  POPUP
// ═══════════════════════════════════════════════════════
let popCb=null;
function showPop(ic,title,body,color,cb){
  const box=document.getElementById('pop-box');
  box.style.setProperty('--pop-c',color);
  document.getElementById('pop-ic').textContent=ic;
  document.getElementById('pop-title').textContent=title;
  document.getElementById('pop-body').textContent=body;
  popCb=cb;
  document.getElementById('pop').classList.add('show');
}
function closePop(){
  document.getElementById('pop').classList.remove('show');
  if(popCb){const f=popCb;popCb=null;f();}
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closePop();});

function restart(){
  branch=null;
  document.documentElement.style.setProperty('--c1','#D4A843');
  document.documentElement.style.setProperty('--c1r','212,168,67');
  toScene(0);
  setTimeout(()=>document.getElementById('dots').style.opacity='0',600);
}

// ═══════════════════════════════════════════════════════
//  INTRO REVEAL
// ═══════════════════════════════════════════════════════
const QUOTE="Tout l'univers conspire pour que tu accomplisses ta Légende Personnelle.";
const GOLDS=['Légende','Personnelle.','conspire','univers'];
function buildQuote(){
  document.getElementById('s0-quote').innerHTML=QUOTE.split(' ').map(w=>
    `<span class="word${GOLDS.includes(w)?' gold':''}">${w} </span>`).join('');
}
function revealIntro(){
  setTimeout(()=>{
    document.getElementById('s0-ey').style.opacity='1';
    document.getElementById('s0-title').classList.add('vis');
    document.getElementById('s0-sub').classList.add('vis');
  },300);
  setTimeout(()=>document.getElementById('s0-hr').style.opacity='1',900);
  const words=document.querySelectorAll('.word');
  words.forEach((w,i)=>setTimeout(()=>w.classList.add('vis'),1100+i*95));
  const after=1100+words.length*95;
  setTimeout(()=>{
    document.getElementById('s0-hr2').style.opacity='1';
  },after+150);
  setTimeout(()=>{
    document.getElementById('s0-cta').style.opacity='1';
    document.getElementById('dots').style.opacity='1';
  },after+600);
}

// ═══════════════════════════════════════════════════════
//  NIGHT TOGGLE — Improved smooth transitions
// ═══════════════════════════════════════════════════════
let isNight = false;
function toggleNight(){
  isNight = !isNight;
  document.body.classList.toggle('night', isNight);

  // Apply click animation: 2 fast spins
  document.querySelectorAll('.sun-grp').forEach(g => {
    g.classList.add('spin-click');
    setTimeout(() => g.classList.remove('spin-click'), 400);
  });
}

//  INIT
// ═══════════════════════════════════════════════════════
initCanvas();
requestAnimationFrame(drawFrame);
window.addEventListener('resize',initCanvas);
window.addEventListener('load',()=>{
  buildQuote();
  setTimeout(revealIntro,200);
});
